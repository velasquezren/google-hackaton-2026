# ==============================================================================
# PIPELINE CI/CD DE GOOGLE CLOUD BUILD PARA DJANGO CLOUD RUN
# ==============================================================================
steps:
  # 1. Compilar la imagen de contenedor usando Docker
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '.'
    id: 'Build Container'

  # 2. Subir la imagen de contenedor a Google Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY}/${_SERVICE_NAME}:${SHORT_SHA}'
    id: 'Push Image to Registry'

  # 3. Correr las migraciones de Django de forma aislada
  # (Se utiliza la imagen compilada conectándola a Cloud SQL mediante el proxy integrado)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud beta run jobs deploy migrate-${_SERVICE_NAME} \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY}/${_SERVICE_NAME}:${SHORT_SHA} \
          --region=${_REGION} \
          --command="python" \
          --args="manage.py,migrate" \
          --service-account=${_SERVICE_ACCOUNT} \
          --set-env-vars="USE_SQLITE=False" \
          --add-cloudsql-instances=${_CLOUDSQL_CONNECTION_NAME} \
          --set-secrets="DJANGO_SECRET_KEY=DJANGO_SECRET_KEY:latest,DB_NAME=DB_NAME:latest,DB_USER=DB_USER:latest,DB_PASSWORD=DB_PASSWORD:latest,DB_HOST=DB_HOST:latest,DB_PORT=DB_PORT:latest" \
          --execute-now \
          --wait
    id: 'Run Database Migrations'

  # 4. Desplegar la API en Google Cloud Run vinculando secretos de Secret Manager
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REGISTRY}/${_SERVICE_NAME}:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--service-account=${_SERVICE_ACCOUNT}'
      - '--add-cloudsql-instances=${_CLOUDSQL_CONNECTION_NAME}'
      - '--vpc-connector=${_VPC_CONNECTOR_NAME}' # Conexión interna privada a Cloud SQL
      # Inyectar secretos en producción directamente desde Secret Manager
      - '--set-secrets=DJANGO_SECRET_KEY=DJANGO_SECRET_KEY:latest,DB_NAME=DB_NAME:latest,DB_USER=DB_USER:latest,DB_PASSWORD=DB_PASSWORD:latest,DB_HOST=DB_HOST:latest,DB_PORT=DB_PORT:latest,JWT_SECRET_KEY=JWT_SECRET_KEY:latest'
      - '--set-env-vars=USE_SQLITE=False,GCP_PROJECT_ID=${PROJECT_ID},GCP_REGION=${_REGION}'
    id: 'Deploy to Cloud Run'

# Valores por defecto configurables en los disparadores (Triggers) de Cloud Build
substitutions:
  _REGION: 'us-central1'
  _ARTIFACT_REGISTRY: 'forest-fires-registry'
  _SERVICE_NAME: 'forest-fire-backend'
  _SERVICE_ACCOUNT: 'cloud-run-backend-sa@PROJECT_ID.iam.gserviceaccount.com'
  _CLOUDSQL_CONNECTION_NAME: 'PROJECT_ID:us-central1:forest-fires-db-instance'
  _VPC_CONNECTOR_NAME: 'projects/PROJECT_ID/locations/us-central1/connectors/serverless-vpc-conn'

options:
  logging: CLOUD_LOGGING_ONLY
